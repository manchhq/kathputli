name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-binstall
      - name: Install cargo-crap
        run: cargo binstall -y --force cargo-crap   # --force: rust-cache leaves stale install metadata
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test (default features)
        run: cargo nextest run
      - name: Test (all features)
        run: cargo nextest run --all-features
      - name: Doctests
        run: cargo test --doc --all-features
      # --all-features so feature-gated code (e.g. the `system` status actor)
      # is compiled and measured — otherwise it reads as 0% and inflates CRAP.
      - name: CRAP score (fail above 30)
        run: just crap --format github
